<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบวันนัดพิจารณาคดีศาล</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('https://images.unsplash.com/photo-1589829085413-56de8ae18c73?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            font-family: 'Sarabun', sans-serif;
            transition: background-color 0.5s ease;
        }
        /* 📺 CSS สำหรับโหมดทีวีประชาสัมพันธ์ (Dark Kiosk Mode) */
        body.dark-kiosk {
            background-image: linear-gradient(rgba(15, 15, 15, 0.98), rgba(15, 15, 15, 0.98)) !important;
        }
        body.dark-kiosk #mainContainer {
            background-color: #1a1a1a !important;
            color: #f3f4f6 !important;
            border-color: #2d2d2d;
        }
        body.dark-kiosk .bg-gray-50 { background-color: #262626 !important; }
        body.dark-kiosk .bg-gray-100 { background-color: #262626 !important; }
        body.dark-kiosk .bg-gray-200 { background-color: #333333 !important; color: #f3f4f6 !important; }
        body.dark-kiosk .text-amber-800 { color: #fbbf24 !important; }
        body.dark-kiosk .text-gray-500 { color: #a3a3a3 !important; }
        body.dark-kiosk .text-gray-700 { color: #e5e7eb !important; }
        body.dark-kiosk input { background-color: #262626 !important; color: white !important; border-color: #404040 !important; }
        body.dark-kiosk .mobile-card { background-color: #262626 !important; border-color: #404040 !important; }
        body.dark-kiosk tr:hover { background-color: #262626 !important; }

        /* 🖨️ CSS สำหรับโหมดพิมพ์รายงานหน้าห้องพิจารณาคดี */
        @media print {
            body { background-image: none !important; background-color: white !important; color: black !important; }
            .no-print, button, input, #lastUpdateText { display: none !important; }
            #mainContainer { box-shadow: none !important; max-w: 100% !important; margin: 0 !important; padding: 0 !important; opacity: 1 !important; border: none !important; }
            .bg-amber-800 { background-color: #7c2d12 !important; color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            th { background-color: #e5e7eb !important; color: black !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            td { color: black !important; border-bottom: 1px solid #d1d5db !important; }
            .print-footer { border-t: 1px solid #e5e7eb !important; color: #555555 !important; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="text-gray-100 min-h-screen p-2 md:p-6">

    <div id="mainContainer" class="max-w-6xl mx-auto bg-white text-gray-800 rounded-2xl shadow-2xl overflow-hidden opacity-98 transition-all duration-500 flex flex-col justify-between">
        <div>
            <div class="p-6 bg-amber-800 text-white flex flex-col md:flex-row justify-between items-center gap-4 border-b-4 border-amber-900">
                <div class="text-center md:text-left">
                    <h1 class="text-2xl md:text-3xl font-bold tracking-wide">🏛️ ระบบบริการข้อมูลตารางนัดพิจารณาคดี</h1>
                    <p class="text-amber-200 text-xs md:text-sm mt-1">ศาลแขวงอุบลราชธานี • หน้าจอประชาสัมพันธ์อิเล็กทรอนิกส์</p>
                </div>
                <div class="flex flex-col items-center md:items-end gap-2">
                    <p id="lastUpdateText" class="text-xs bg-amber-900 bg-opacity-60 px-4 py-1.5 rounded-full shadow-inner border border-amber-700">กำลังตรวจสอบระบบ...</p>
                    <div class="no-print flex gap-2">
                        <button id="kioskToggle" onclick="toggleKioskMode()" class="bg-slate-700 hover:bg-slate-800 text-white text-xs px-3 py-1.5 rounded-lg font-medium transition shadow">
                            📺 เปิดโหมดทีวี
                        </button>
                        <button onclick="window.print()" class="bg-amber-600 hover:bg-amber-700 text-white text-xs px-3 py-1.5 rounded-lg font-medium transition shadow">
                            🖨️ พิมพ์เอกสาร
                        </button>
                    </div>
                </div>
            </div>

            <div class="p-4 md:p-8">
                <div class="no-print flex flex-col lg:flex-row justify-between items-center gap-4 mb-6 bg-gray-50 p-4 rounded-xl border border-gray-200 shadow-sm">
                    <div class="flex items-center gap-2 bg-white p-1.5 rounded-lg w-full lg:w-auto justify-between shadow border border-gray-100">
                        <button id="btnPrev" onclick="changeDay(-1)" class="px-4 py-2 bg-gray-100 hover:bg-amber-700 hover:text-white rounded-md font-bold text-gray-700 disabled:opacity-40 disabled:hover:bg-gray-100 disabled:hover:text-gray-700 transition duration-200">
                            ◀ ก่อนหน้า
                        </button>
                        <div id="currentDateDisplay" class="font-bold text-amber-800 text-base md:text-lg min-w-[140px] text-center">
                            กำลังโหลดวันนัด...
                        </div>
                        <button id="btnNext" onclick="changeDay(1)" class="px-4 py-2 bg-gray-100 hover:bg-amber-700 hover:text-white rounded-md font-bold text-gray-700 disabled:opacity-40 disabled:hover:bg-gray-100 disabled:hover:text-gray-700 transition duration-200">
                            ถัดไป ▶
                        </button>
                    </div>

                    <div class="flex gap-2 w-full lg:flex-1 max-w-xl">
                        <input type="text" id="searchInput" onkeyup="searchData()" placeholder="พิมพ์ ค้นหาด่วน... เลขคดี, ห้องพิจารณา, สาเหตุที่นัด" 
                               class="w-full p-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-600 bg-white text-sm shadow-inner">
                    </div>
                </div>

                <div class="hidden md:block overflow-x-auto rounded-xl border border-gray-200 shadow-md">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 text-gray-700 text-sm tracking-wide">
                                <th class="p-4 border-b font-semibold w-[25%]">เลขคดีดำ</th>
                                <th class="p-4 border-b font-semibold w-[15%]">เวลานัด</th>
                                <th class="p-4 border-b font-semibold w-[25%]">ห้องพิจารณาคดี</th>
                                <th class="p-4 border-b font-semibold w-[35%]">สาเหตุที่นัด</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-gray-100 text-sm">
                            </tbody>
                    </table>
                </div>

                <div id="cardContainer" class="block md:hidden space-y-3">
                    </div>
            </div>
        </div>

        <div class="print-footer p-4 bg-gray-50 text-center text-xs md:text-sm text-gray-500 border-t border-gray-100 transition-colors duration-500">
            พัฒนาโดย <span class="font-semibold text-gray-700 transition-colors duration-500">นายวีระยุทธ ประชุมรักษ์</span> พนักงานคอมพิวเตอร์ ประจำศาลแขวงอุบลราชธานี กลุ่มงานเทคโนโลยีสารสนเทศ
        </div>
    </div>

    <script>
        // ⚠️ บรรทัดที่ 63: นำลิงก์ Web App จาก Google Apps Script มาใส่แทนลิงก์ด้านล่างนี้ได้เลยครับ
        const GAS_URL = 'ใส่_URL_WEB_APP_ของใช้งานจริงที่นี่';
        
        let allCaseData = [];       
        let availableDates = [];    
        let currentDateIndex = 0;   
        let currentFilteredData = []; 
        let kioskInterval = null;

        async function fetchData() {
            if (GAS_URL.includes('https://script.google.com/macros/s/AKfycbxXAWkOHlwMTRf6zF6iLMni288NVd4Po5gRGyoQeBhiSnofZs7tdAeGcZdbDHkB0cIw/exec') || GAS_URL === '') {
                Swal.fire({
                    icon: 'warning',
                    title: 'โหมดสาธิต: ข้อมูลตัวอย่าง',
                    html: 'ตรวจพบว่ายังไม่ได้นำลิงก์ <b>Web App API</b> จริงมาเชื่อมต่อ<br>ระบบจะเปิดข้อมูลจำลองเพื่อแสดงดีไซน์และสีแท็กให้ตรวจสอบก่อน',
                    confirmButtonText: 'รับทราบและทดสอบระบบ'
                });
                loadMockData();
                return;
            }

            Swal.fire({
                title: 'กำลังเชื่อมต่อฐานข้อมูล...',
                text: 'กรุณารอสักครู่ ระบบกำลังดึงตารางนัดหมายความปลอดภัยสูง',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                const response = await fetch(GAS_URL);
                allCaseData = await response.json();
               
                availableDates = [...new Set(allCaseData.map(item => item.appointDate))].filter(Boolean);
                
                if (availableDates.length > 0) {
                    currentDateIndex = 0; 
                    updateUIForCurrentDate();
                    const now = new Date();
                    document.getElementById('lastUpdateText').innerText = `🟢 ข้อมูลออนไลน์: ${now.toLocaleTimeString('th-TH')} น.`;
                } else {
                    document.getElementById('currentDateDisplay').innerText = "ไม่มีข้อมูลนัดคดี";
                    document.getElementById('btnPrev').disabled = true;
                    document.getElementById('btnNext').disabled = true;
                    document.getElementById('lastUpdateText').innerText = "ตารางใน Sheets ว่างเปล่า";
                    renderLayout([]);
                }
                Swal.close();
            } catch (error) {
                Swal.fire('เกิดข้อผิดพลาด!', 'ไม่สามารถเข้าถึงสิทธิ์ Web App API ได้ (เช็คการตั้งค่าสิทธิ์ให้เป็น Everyone)', 'error');
                loadMockData();
            }
        }

        function getBadgeStyle(caseNo) {
            if (!caseNo) return 'bg-gray-100 text-gray-800 border-gray-200';
            const cleanNo = caseNo.toUpperCase();
            if (cleanNo.includes('อ')) {
                return 'bg-red-50 text-red-700 border border-red-200 font-bold'; 
            } else if (cleanNo.includes('ผบ')) {
                return 'bg-blue-50 text-blue-700 border border-blue-200 font-bold'; 
            } else if (cleanNo.includes('ม')) {
                return 'bg-emerald-50 text-emerald-700 border border-emerald-200 font-bold'; 
            }
            return 'bg-amber-50 text-amber-800 border border-amber-200'; 
        }

        function updateUIForCurrentDate() {
            const targetDate = availableDates[currentDateIndex];
            document.getElementById('currentDateDisplay').innerText = `📅 ${targetDate}`;
            
            document.getElementById('btnPrev').disabled = (currentDateIndex === 0);
            document.getElementById('btnNext').disabled = (currentDateIndex === availableDates.length - 1);

            currentFilteredData = allCaseData.filter(item => item.appointDate === targetDate);
            document.getElementById('searchInput').value = '';
            renderLayout(currentFilteredData);
        }

        function changeDay(step) {
            const newIndex = currentDateIndex + step;
            if (newIndex >= 0 && newIndex < availableDates.length) {
                currentDateIndex = newIndex;
                updateUIForCurrentDate();
            }
        }

        function searchData() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            if (keyword === "") {
                renderLayout(currentFilteredData);
                return;
            }
            const filtered = currentFilteredData.filter(item => 
                (item.blackCaseNo && item.blackCaseNo.toLowerCase().includes(keyword)) ||
                (item.room && item.room.toLowerCase().includes(keyword)) ||
                (item.cause && item.cause.toLowerCase().includes(keyword))
            );
            renderLayout(filtered);
        }

        function renderLayout(data) {
            const tbody = document.getElementById('tableBody');
            const cardContainer = document.getElementById('cardContainer');
            
            tbody.innerHTML = '';
            cardContainer.innerHTML = '';
            
            if (data.length === 0) {
                const emptyRow = '<tr><td colspan="4" class="text-center p-12 text-gray-400">❌ ไม่พบข้อมูลการนัดหมายพิจารณาคดี</td></tr>';
                const emptyCard = '<div class="text-center p-8 bg-gray-50 rounded-xl text-gray-400 border border-dashed">❌ ไม่พบข้อมูลการนัดหมาย</div>';
                tbody.innerHTML = emptyRow;
                cardContainer.innerHTML = emptyCard;
                return;
            }

            data.forEach(item => {
                const badgeClass = getBadgeStyle(item.blackCaseNo);
                
                const row = `
                    <tr class="hover:bg-amber-50/50 transition duration-150">
                        <td class="p-4 font-semibold"><span class="px-2.5 py-1 rounded-md text-xs tracking-wider ${badgeClass}">${item.blackCaseNo}</span></td>
                        <td class="p-4 font-medium text-gray-700">⏰ ${item.time} น.</td>
                        <td class="p-4 text-amber-900 font-medium">${item.room === '-' ? '<span class="text-gray-400">-</span>' : '🚪 ' + item.room}</td>
                        <td class="p-4 text-gray-600 text-xs md:text-sm">${item.cause}</td>
                    </tr>
                `;
                tbody.innerHTML += row;

                const card = `
                    <div class="mobile-card bg-white p-4 rounded-xl border border-gray-100 shadow-sm space-y-2">
                        <div class="flex justify-between items-center">
                            <span class="px-2.5 py-0.5 rounded-md text-xs tracking-wider ${badgeClass}">${item.blackCaseNo}</span>
                            <span class="text-sm font-semibold text-gray-500">⏰ ${item.time} น.</span>
                        </div>
                        <div class="text-sm font-bold text-amber-900">${item.room === '-' ? '🚪 ไม่ระบุห้องพิจารณา' : '🚪 ' + item.room}</div>
                        <div class="text-xs text-gray-600 bg-gray-50 p-2 rounded border border-gray-100"><b class="text-gray-700">สาเหตุ:</b> ${item.cause}</div>
                    </div>
                `;
                cardContainer.innerHTML += card;
            });
        }

        function toggleKioskMode() {
            const body = document.body;
            const btn = document.getElementById('kioskToggle');
            
            if (!kioskInterval) {
                body.classList.add('dark-kiosk');
                btn.innerHTML = '🛑 ปิดโหมดทีวี';
                btn.classList.replace('bg-slate-700', 'bg-red-600');
                
                kioskInterval = setInterval(() => {
                    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 2) {
                        window.scrollTo({ top: 0, behavior: 'smooth' }); 
                    } else {
                        window.scrollBy({ top: 35, behavior: 'smooth' });
                    }
                }, 2500);
            } else {
                clearInterval(kioskInterval);
                kioskInterval = null;
                body.classList.remove('dark-kiosk');
                btn.innerHTML = '📺 เปิดโหมดทีวี';
                btn.classList.replace('bg-red-600', 'bg-slate-700');
                window.scrollTo({ top: 0 });
            }
        }

        function loadMockData() {
            allCaseData = [
                { blackCaseNo: "อ.3503/2569", appointDate: "09/07/2569", time: "09.00", room: "ห้องพิจารณาคดีที่1", cause: "นัดสอบคำให้การจำเลย" },
                { blackCaseNo: "ผบE4964/2569", appointDate: "09/07/2569", time: "10.30", room: "ห้องพิจารณาคดีที่10", cause: "นัดไกล่เกลี่ย/ให้การ/สืบพยาน" },
                { blackCaseNo: "ม109/2569", appointDate: "10/07/2569", time: "13.00", room: "ห้องพิจารณาคดีที่10", cause: "นัดไกล่เกลี่ย/ให้การ/สืบพยาน" }
            ];
            availableDates = [...new Set(allCaseData.map(item => item.appointDate))].filter(Boolean);
            currentDateIndex = 0;
            document.getElementById('lastUpdateText').innerText = `⚠️ ใช้ข้อมูลสาธิตระบบ`;
            updateUIForCurrentDate();
        }

        window.onload = fetchData;
    </script>
</body>
</html>
